services:
  chroma:
    image: chromadb/chroma:1.5.9
    container_name: papers_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      # chromadb/chroma:1.5.x is distroless-like: no python/curl/wget in PATH.
      # Use bash builtin /dev/tcp for zero-dep TCP port check (PLAN v1.0.6 PA15).
      test:
        - CMD
        - /bin/bash
        - -c
        - "</dev/tcp/localhost/8000"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: papers_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chroma
    volumes:
      - sqlite_data:/data
      - pdfs:/app/pdfs
    depends_on:
      chroma:
        condition: service_healthy

volumes:
  chroma_data:
  sqlite_data:
  pdfs:
